<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03 fig-desc-03"><title id="fig-title-03">Top-k versus top-p across three distribution shapes</title><desc id="fig-desc-03">A two-row by three-column grid of bar charts over peaked, medium, and flat distributions. The top row, top-k, keeps a constant three bars in every case. The bottom row, top-p, keeps one, three, then four bars, tracking the model's uncertainty.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="00-foundations-sampling-and-logits" figure-number="03" date-generated="2026-05-29"/></metadata>
