<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01 fig-desc-01">
<title id="fig-title-01">Entropy collapse after committing a structural token</title>
<desc id="fig-desc-01">Two stacked next-token distributions on a shared baseline. Before structural commitment, probability is spread broadly across many tokens (high entropy). After committing a label, mass concentrates into one or two tall bars (low entropy) and the rest are suppressed.</desc>
