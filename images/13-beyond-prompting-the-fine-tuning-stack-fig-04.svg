<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04 fig-desc-04"><title id="fig-title-04">GRPO Group-Relative Baseline (Critic Removed)</title><desc id="fig-desc-04">Two panels. Left, PPO: one prompt, one output, and a separate critic network that supplies the baseline, an extra cost component. Right, GRPO: one prompt fans out to a group of four sampled outputs; their rewards are standardized against the group mean, so outputs above the mean line are reinforced and those below are suppressed. No critic appears on the right; its absence is the message.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="13-beyond-prompting-the-fine-tuning-stack" figure-number="04" date-generated="2026-05-29"/></metadata>
