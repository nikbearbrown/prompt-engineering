<text x="60" y="402" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">GRPO samples a group per prompt and standardizes their rewards as the advantage. The absence of a separate critic on the right is the saving.</text>
