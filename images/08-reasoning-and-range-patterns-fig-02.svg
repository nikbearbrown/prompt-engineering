<title id="fig-title-02">Three routes to the same step-shaped trajectory</title>
<desc id="fig-desc-02">One model and query reach outcomes by three routes. Direct greedy decode misses and lands on a wrong answer. A step-by-step prompt cue, and top-k first-token inspection with no prompt change, both reach the same correct trajectory, proving reasoning was latent in the distribution.</desc>
