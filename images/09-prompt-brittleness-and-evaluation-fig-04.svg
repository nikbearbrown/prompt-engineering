<!-- Stage 5: regression gate (red emphasis, narrow vertical bar) -->
<rect x="642" y="150" width="14" height="60" fill="#C8102E"/>
<text x="649" y="228" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E" text-anchor="middle">gate</text>

<text x="40" y="360" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Optimize only behind the regression gate: ship a change when the distribution improves, not when one variant spikes.</text>
