<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04 fig-desc-04">
<title id="fig-title-04">The evaluation pipeline: report a distribution, not a point</title>
<desc id="fig-desc-04">A left-to-right five-stage pipeline. A prompt fans out into semantically-equivalent variants, which converge on one shared held-out set, then feed an accuracy histogram with a median line, then a max-versus-average metric branch, and finally a regression gate that ships only on pass.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="09-prompt-brittleness-and-evaluation" figure-number="04" date-generated="2026-05-29"/></metadata>
