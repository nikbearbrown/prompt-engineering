<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02 fig-desc-02"><title id="fig-title-02">The Instruction-Capacity Budget</title><desc id="fig-desc-02">A single stacked bar: the agent's own system prompt pre-spends part of the model's distinct-instruction ceiling, leaving a narrow band for the engineer's instruction file below a degradation cap.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="14-prompt-engineering-for-cli-coding-agents" figure-number="02" date-generated="2026-05-29"/></metadata>
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
<text x="350" y="34" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">The Instruction-Capacity Budget</text>
<text x="350" y="54" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">The agent's own system prompt pre-spends the distinct-instruction ceiling</text>

<!-- y axis from zero -->
<line x1="250" y1="100" x2="250" y2="360" stroke="#2a1a0e" stroke-width="1.5"/>
<line x1="250" y1="360" x2="470" y2="360" stroke="#2a1a0e" stroke-width="1.5"/>
<text x="244" y="364" text-anchor="end" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">0</text>

<!-- bar plot background -->
<rect x="290" y="110" width="120" height="250" fill="#F5F5F5" stroke="none"/>

<!-- lower segment: system prompt (gray) -->
<rect x="290" y="270" width="120" height="90" fill="#D4D4D4" stroke="#2a1a0e" stroke-width="1.2"/>
<!-- upper segment: available (red emphasis) -->
<rect x="290" y="150" width="120" height="120" fill="#C8102E" stroke="#2a1a0e" stroke-width="1.2"/>

<!-- ceiling cap -->
<line x1="282" y1="138" x2="418" y2="138" stroke="#2a1a0e" stroke-width="2" stroke-dasharray="5 4"/>
<text x="350" y="130" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">distinct-instruction ceiling (adherence degrades above)</text>

<!-- bracket showing margin to ceiling -->
<path d="M428,150 L436,150 L436,138 L428,138" fill="none" stroke="#545454" stroke-width="1"/>
<text x="442" y="148" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">margin to cap</text>

<!-- segment labels -->
<text x="430" y="215" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E">your instruction file</text>
<text x="430" y="231" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">(the band you actually control)</text>
<text x="430" y="320" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">agent's system prompt</text>
<text x="430" y="336" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">(already spent)</text>

<text x="60" y="392" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Only a narrow band remains for your instructions before adherence degrades uniformly across all of them.</text>
</svg>
