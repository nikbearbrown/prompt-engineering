<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02 fig-desc-02"><title id="fig-title-02">Distribution shape sets reliability: peaked versus flat</title><desc id="fig-desc-02">Two bar-chart panels. A peaked distribution sends repeated draws to one converged answer; a flat distribution scatters repeated draws across different answers. Same machine, different shape.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="01-the-stochastic-machine" figure-number="02" date-generated="2026-05-29"/></metadata>
