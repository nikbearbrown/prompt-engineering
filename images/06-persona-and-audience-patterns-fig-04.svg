<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04 fig-desc-04">
<title id="fig-title-04">Five-step diagnostic protocol for a degraded persona system</title>
<desc id="fig-desc-04">An ordered top-to-bottom protocol: start, then four decision tests (single-turn isolation, prompt-level diagnosis, drift characterization, multi-agent isolation), ending in a compound-failure check whose feedback edge loops back to re-test for masked failures.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="06-persona-and-audience-patterns" figure-number="04" date-generated="2026-05-29"/></metadata>
