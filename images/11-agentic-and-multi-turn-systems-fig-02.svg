<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02 fig-desc-02">
<title id="fig-title-02">Chain success decays multiplicatively with length</title>
<desc id="fig-desc-02">A line chart with chain length on the horizontal axis and chain success on the vertical axis from zero. One monotonically decreasing curve starts high at the top left and decays with a concave-down multiplicative shape toward the lower right without reaching zero. Two reference dots mark a shorter chain higher and a longer chain lower, with guide lines to the vertical axis.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="11-agentic-and-multi-turn-systems" figure-number="02" date-generated="2026-05-29"/></metadata>
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
<text x="40" y="42" font-family="'EB Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">At 95% per step, long chains still fail often</text>
<text x="40" y="64" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Chain success approximately P to the N, decaying as step count grows</text>

