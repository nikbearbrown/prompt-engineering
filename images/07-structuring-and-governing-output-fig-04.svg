<line x1="40" y1="256" x2="98" y2="256" stroke="#2a1a0e" stroke-width="1" marker-end="url(#arrow07f4)"/>
<text x="36" y="340" text-anchor="start" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">input / pressure reaches both</text>

