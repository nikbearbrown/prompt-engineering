<text x="175" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#C8102E">shared context boundary</text>
<rect x="100" y="156" width="150" height="48" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
<text x="175" y="184" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Generator</text>
