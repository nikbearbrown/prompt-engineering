<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04 fig-desc-04">
<title id="fig-title-04">In-prompt self-filter versus isolated classifier</title>
<desc id="fig-desc-04">Two architectures. Left: generator and filter share one context, so the input pressure reaches both and the filter can be talked past. Right: the generator's output artifact passes to a filter in a separate, clean context that the input pressure never reaches.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="07-structuring-and-governing-output" figure-number="04" date-generated="2026-05-29"/></metadata>
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
<defs>
<marker id="arrow07f4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="#2a1a0e"/>
</marker>
</defs>

<!-- divider -->
<line x1="350" y1="70" x2="350" y2="380" stroke="#D4D4D4" stroke-width="1"/>

<text x="175" y="44" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-size="15" fill="#2a1a0e">In-prompt self-filter</text>
<text x="175" y="62" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">shared context &#183; can be talked past</text>
<text x="525" y="44" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-size="15" fill="#2a1a0e">Isolated classifier</text>
<text x="525" y="62" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">clean context &#183; robust</text>

