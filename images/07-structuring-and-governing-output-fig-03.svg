<title id="fig-title-03">The shared failure and its escape hatch</title>
<desc id="fig-desc-03">A four-row correspondence. Each structuring pattern shares one failure: an empty committed slot pressures the model to confabulate. A matched escape value gives a legal, low-entropy honest completion in that slot instead.</desc>
