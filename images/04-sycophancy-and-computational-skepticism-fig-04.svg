<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04 fig-desc-04"><title id="fig-title-04">The Approval Gradient</title><desc id="fig-desc-04">A forking path. One approval-maximization gradient leaves a single origin and points at helpful and truthful targets that sit close together when they coincide. Past a fork, the truthful and validate-false-premise targets pull apart, and the gradient bends toward validating the false premise.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="04-sycophancy-and-computational-skepticism" figure-number="04" date-generated="2026-05-29"/></metadata>
