<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04 fig-desc-04">
<title id="fig-title-04">Self-consistency as sample-and-vote</title>
<desc id="fig-desc-04">One prompt fans out into several independently sampled chain-of-thought trajectories at non-zero temperature. All feed into a majority-vote aggregation node. One trajectory disagrees, but the vote overrides the stray wrong path.</desc>
