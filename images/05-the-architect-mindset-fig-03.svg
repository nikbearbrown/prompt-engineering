<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03 fig-desc-03"><title id="fig-title-03">Negative Constraints Remove Probability Mass</title><desc id="fig-desc-03">Three distributions over the same output-space axis. Baseline: broad high-entropy spread. Positive constraint: one region built up taller while mass remains everywhere. Negative constraint: two regions zeroed out and crossed by a blocking bar, with the surviving mass renormalized taller — lower entropy, narrower admissible set.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="05-the-architect-mindset" figure-number="03" date-generated="2026-05-29"/></metadata>
