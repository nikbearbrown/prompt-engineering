<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02 fig-desc-02"><title id="fig-title-02">Where truth would have to live in the loss, and does not</title><desc id="fig-desc-02">A closed training loop: a corpus feeds a model, which predicts the next token, compared against the actual next token, with the loss fed back. A detached world-and-facts block sits off to the side with a broken connector that never reaches the comparison, marking the missing truth term.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="02-hallucination-and-the-plausibility-truth-gap" figure-number="02" date-generated="2026-05-29"/></metadata>
