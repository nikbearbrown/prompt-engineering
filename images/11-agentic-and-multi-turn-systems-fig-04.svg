<title id="fig-title-04">Constrained decoding masks every token illegal in the current grammar state</title>
<desc id="fig-desc-04">One decode step. On the left, a compiled-grammar finite-state machine of three nodes with one current state highlighted. An arrow leads to a column of eight candidate vocabulary slots; the grammar-legal tokens are open while the illegal ones are struck through to mark them masked to near-zero. A bold arrow points from a legal slot to a single emitted-token cell.</desc>
