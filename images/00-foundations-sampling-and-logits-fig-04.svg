<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04 fig-desc-04"><title id="fig-title-04">The chain-rule feedback loop</title><desc id="fig-desc-04">Three growing context blocks, each feeding a small distribution glyph that arrows to a sampled token. Each sampled token is appended forward into the next, longer context block, so an early sample propagates through every later step.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="00-foundations-sampling-and-logits" figure-number="04" date-generated="2026-05-29"/></metadata>
