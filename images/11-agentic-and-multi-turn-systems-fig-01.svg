<marker id="arrowr11" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#C8102E"/></marker>
</defs>
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
<text x="40" y="42" font-family="'EB Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">The loop interrupts the compounding chain</text>
<text x="40" y="64" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">An externally-sourced Observation re-anchors the next Thought every few steps</text>

