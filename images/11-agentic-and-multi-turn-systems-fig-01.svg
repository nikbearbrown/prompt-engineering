<line x1="234" y1="270" x2="318" y2="155" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrowk11)"/>

<!-- Anchor tick on the Observation->Thought return arrow (red emphasis) -->
<line x1="262" y1="227" x2="290" y2="243" stroke="#C8102E" stroke-width="3"/>
<text x="300" y="225" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">re-anchor</text>

