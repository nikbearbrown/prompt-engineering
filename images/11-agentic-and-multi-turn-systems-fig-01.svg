<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01 fig-desc-01">
<title id="fig-title-01">The ReAct loop injects an external Observation that re-anchors the chain</title>
<desc id="fig-desc-01">A three-node clockwise loop: Thought at top, Action at lower right, Observation at lower left. Thought and Action are model-generated; Observation is fed by an external stub from outside the loop. An anchor tick crosses the Observation-to-Thought return arrow, marking the point that interrupts the compounding dependency chain.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="11-agentic-and-multi-turn-systems" figure-number="01" date-generated="2026-05-29"/></metadata>
