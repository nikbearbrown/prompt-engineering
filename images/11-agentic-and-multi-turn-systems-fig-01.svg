<rect x="300" y="105" width="100" height="50" fill="#F5F5F5" stroke="#545454" stroke-width="1.5"/>
<text x="350" y="135" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e" text-anchor="middle">Thought</text>

<!-- Action node (secondary) -->
<rect x="440" y="288" width="100" height="50" fill="#F5F5F5" stroke="#545454" stroke-width="1.5"/>
<text x="490" y="318" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e" text-anchor="middle">Action</text>

<!-- Observation node (red emphasis = externally injected) -->
<rect x="160" y="288" width="120" height="50" fill="#F5F5F5" stroke="#C8102E" stroke-width="2"/>
<text x="220" y="318" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#C8102E" text-anchor="middle">Observation</text>

<!-- External feed stub into Observation -->
<line x1="60" y1="313" x2="156" y2="313" stroke="#C8102E" stroke-width="2.5" marker-end="url(#arrowr11)"/>
<text x="60" y="300" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">external world</text>

<text x="40" y="392" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Observation tokens come from a tool, not the model: they interrupt (not erase) the chain, moving compounding from P to the N toward P to the k.</text>
