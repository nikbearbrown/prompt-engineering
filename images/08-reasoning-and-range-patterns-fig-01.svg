<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01 fig-desc-01">
<title id="fig-title-01">Tighten the path versus widen the sample</title>
<desc id="fig-desc-01">Two distributions on a shared baseline. Reasoning patterns tighten the distribution into a tall narrow peak and take the single best path. Range patterns widen the distribution and draw several samples across its spread.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="08-reasoning-and-range-patterns" figure-number="01" date-generated="2026-05-29"/></metadata>
