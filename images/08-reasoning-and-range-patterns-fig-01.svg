</marker>
</defs>

<text x="350" y="34" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Two opposite moves on one sampling machine</text>

<!-- divider -->
<line x1="350" y1="60" x2="350" y2="380" stroke="#D4D4D4" stroke-width="1"/>

<!-- LEFT: tighten -->
<text x="175" y="82" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e" font-weight="600">Tighten the path</text>
<text x="175" y="100" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">reasoning patterns</text>
<rect x="60" y="120" width="230" height="180" fill="#F5F5F5" stroke="none"/>
<line x1="60" y1="300" x2="290" y2="300" stroke="#2a1a0e" stroke-width="1"/>
<line x1="60" y1="120" x2="60" y2="300" stroke="#2a1a0e" stroke-width="1"/>
<!-- narrow tall peak (red emphasis) -->
<path d="M 100 300 C 150 300 160 140 175 140 C 190 140 200 300 250 300 Z" fill="#C8102E" fill-opacity="0.15" stroke="#C8102E" stroke-width="2"/>
<!-- single chosen path arrow at peak -->
<line x1="175" y1="120" x2="175" y2="138" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow08f1)"/>
<text x="175" y="324" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">one best path, mode</text>

<!-- RIGHT: widen -->
<text x="525" y="82" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="#2a1a0e" font-weight="600">Widen the sample</text>
<text x="525" y="100" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">range patterns</text>
<rect x="410" y="120" width="230" height="180" fill="#F5F5F5" stroke="none"/>
<line x1="410" y1="300" x2="640" y2="300" stroke="#2a1a0e" stroke-width="1"/>
<line x1="410" y1="120" x2="410" y2="300" stroke="#2a1a0e" stroke-width="1"/>
<!-- broad low hump (gray outline) -->
<path d="M 425 300 C 470 300 480 210 525 210 C 570 210 580 300 625 300 Z" fill="#FFFFFF" stroke="#545454" stroke-width="1.5"/>
