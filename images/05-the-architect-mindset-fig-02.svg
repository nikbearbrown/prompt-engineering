<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02 fig-desc-02"><title id="fig-title-02">PAST Builds the Prompt Slot of PLFR</title><desc id="fig-desc-02">A nested pipeline. The PLFR Prompt stage is a container holding four PAST sub-slots — Problem, Action, Steps, Task. From it the flow runs to Logic, Format, and Result. An external validator, outside the generator, branches off Result and returns to an accept endpoint.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="05-the-architect-mindset" figure-number="02" date-generated="2026-05-29"/></metadata>
