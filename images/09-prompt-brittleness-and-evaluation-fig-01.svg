<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01 fig-desc-01">
<title id="fig-title-01">A prompt's score is the top of a wide distribution, not a capability</title>
<desc id="fig-desc-01">Two horizontal strips of accuracy ticks on a shared axis. Model A's spread is wide with one bold tick marking the single reported top score; Model B's spread is narrower and further right at its median. Median lines show Model B leads at median even though Model A's lone top tick sits rightmost.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="09-prompt-brittleness-and-evaluation" figure-number="01" date-generated="2026-05-29"/></metadata>
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
<text x="40" y="42" font-family="'EB Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">One score is the top of a distribution, not a capability</text>
<text x="40" y="64" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Accuracy across semantically-equivalent format variants for two models</text>

<!-- Plot area -->
<rect x="80" y="100" width="560" height="220" fill="#F5F5F5"/>

<!-- Strip A label -->
<text x="40" y="160" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Model A</text>
<text x="40" y="252" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Model B</text>

<!-- Model A: wide spread of ticks (secondary grey #545454), one bold red top tick -->
<g stroke="#545454" stroke-width="2">
<line x1="120" y1="138" x2="120" y2="172"/><line x1="146" y1="142" x2="146" y2="168"/>
<line x1="172" y1="138" x2="172" y2="172"/><line x1="198" y1="142" x2="198" y2="168"/>
<line x1="224" y1="138" x2="224" y2="172"/><line x1="252" y1="142" x2="252" y2="168"/>
<line x1="280" y1="138" x2="280" y2="172"/><line x1="308" y1="142" x2="308" y2="168"/>
<line x1="338" y1="138" x2="338" y2="172"/><line x1="368" y1="142" x2="368" y2="168"/>
<line x1="400" y1="138" x2="400" y2="172"/><line x1="436" y1="142" x2="436" y2="168"/>
<line x1="476" y1="138" x2="476" y2="172"/><line x1="520" y1="142" x2="520" y2="168"/>
</g>
<!-- Model A reported top tick (red emphasis) -->
<line x1="600" y1="128" x2="600" y2="182" stroke="#C8102E" stroke-width="4"/>
<text x="600" y="118" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E" text-anchor="middle">reported top</text>
<!-- Model A median line (hairline) -->
<line x1="300" y1="125" x2="300" y2="185" stroke="#D4D4D4" stroke-width="2"/>
<text x="300" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">A median</text>

<!-- Model B: narrower spread further right -->
<g stroke="#545454" stroke-width="2">
<line x1="360" y1="232" x2="360" y2="262"/><line x1="386" y1="236" x2="386" y2="258"/>
<line x1="412" y1="232" x2="412" y2="262"/><line x1="438" y1="236" x2="438" y2="258"/>
<line x1="464" y1="232" x2="464" y2="262"/><line x1="490" y1="236" x2="490" y2="258"/>
<line x1="516" y1="232" x2="516" y2="262"/><line x1="542" y1="236" x2="542" y2="258"/>
</g>
<!-- Model B median line -->
<line x1="450" y1="218" x2="450" y2="276" stroke="#D4D4D4" stroke-width="2"/>
<text x="450" y="291" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">B median</text>

<!-- Shared accuracy axis -->
<line x1="80" y1="320" x2="640" y2="320" stroke="#2a1a0e" stroke-width="1.5"/>
<text x="80" y="340" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">lower</text>
<text x="640" y="340" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="end">higher</text>
<text x="360" y="358" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">Accuracy &#8594;</text>

<text x="40" y="390" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Model B wins at the median, yet Model A claims victory on its single best-case format.</text>
