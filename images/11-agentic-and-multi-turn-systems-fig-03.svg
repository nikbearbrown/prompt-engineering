<title id="fig-title-03">Error rate rises with tool-catalog size; a router surfaces only the relevant few</title>
<desc id="fig-desc-03">A bar chart of error rate from zero with four bars rising left to right as the tool catalog grows from small to large. The smallest catalog is short, the largest is tall. To the right, a small router inset shows a router node selecting just two of several tool stubs as the mitigation.</desc>
