<title id="fig-title-03">A non-semantic format change reorders the leaderboard</title>
<desc id="fig-desc-03">Two ranked columns hold the same five model blocks in different orders. Each block is tracked across the reorder by a connector line. A bracket marks the rank-one winner slot, where a different model occupies the top under each format.</desc>
