<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01 fig-desc-01"><title id="fig-title-01">Retrieval versus sampling: two mental models</title><desc id="fig-desc-01">Two stacked panels with parallel layouts. The retrieval panel sends an input into a stored table that returns three identical outputs. The sampling panel sends the same input into a distribution that returns three different outputs.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="01-the-stochastic-machine" figure-number="01" date-generated="2026-05-29"/></metadata>
