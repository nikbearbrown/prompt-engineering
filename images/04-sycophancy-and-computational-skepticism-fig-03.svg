<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03 fig-desc-03"><title id="fig-title-03">Calibration Drift</title><desc id="fig-desc-03">Two identical-layout panels of the dissenter system. Left, intact: pushback reaches only the primary, the agents disagree, and the human gate fires (active). Right, drifted: one extra pushback-to-dissenter arrow makes both agents agree, and the human gate goes dark and never fires.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="04-sycophancy-and-computational-skepticism" figure-number="03" date-generated="2026-05-29"/></metadata>
