<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01 fig-desc-01"><title id="fig-title-01">The Optimization Loop: Write, Score, Propose</title><desc id="fig-desc-01">A closed clockwise cycle: a proposer generates a candidate prompt, a language model runs it on an eval-set example, a scalar metric scores the output against a reference, and the score feeds back to the proposer. The labeled eval set and the metric function enter from outside as fixed user-supplied inputs.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="12-automated-prompt-optimization" figure-number="01" date-generated="2026-05-29"/></metadata>
