<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02 fig-desc-02"><title id="fig-title-02">LoRA Low-Rank Decomposition: W = W0 + BA</title><desc id="fig-desc-02">A large frozen base weight matrix W0 of size d by k is added to the product of two thin matrices: a tall narrow B of size d by r and a short wide A of size r by k. The shared rank r is far smaller than d and k, so the trainable footprint shrinks from d times k to r times the sum of d and k.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="13-beyond-prompting-the-fine-tuning-stack" figure-number="02" date-generated="2026-05-29"/></metadata>
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
<text x="350" y="34" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">LoRA Low-Rank Decomposition</text>
<text x="350" y="54" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13" fill="#2a1a0e">W = W0 + B A</text>

<!-- W0 frozen base square, large, gray -->
<rect x="70" y="120" width="180" height="180" fill="#F5F5F5" stroke="#545454" stroke-width="1.8"/>
<!-- lock-corner notch -->
<path d="M70,140 L90,140 L90,120" fill="none" stroke="#545454" stroke-width="1.8"/>
<rect x="98" y="148" width="22" height="16" fill="none" stroke="#545454" stroke-width="1.2"/>
<path d="M103,148 a6,6 0 0 1 12,0" fill="none" stroke="#545454" stroke-width="1.2"/>
<text x="160" y="218" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="14" fill="#2a1a0e">W0</text>
<text x="160" y="238" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">frozen base (d x k)</text>
<text x="160" y="318" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">d</text>
<text x="58" y="214" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">k</text>

<!-- plus sign -->
<line x1="285" y1="210" x2="315" y2="210" stroke="#2a1a0e" stroke-width="2"/>
<line x1="300" y1="195" x2="300" y2="225" stroke="#2a1a0e" stroke-width="2"/>

<!-- B tall narrow, green -->
<rect x="360" y="120" width="46" height="180" fill="#F5F5F5" stroke="#545454" stroke-width="1.6"/>
<rect x="360" y="120" width="46" height="180" fill="#C8102E" fill-opacity="0.10" stroke="#C8102E" stroke-width="1.8"/>
<text x="383" y="216" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="14" fill="#C8102E">B</text>
<text x="383" y="318" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">r</text>
<text x="348" y="214" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">d</text>

<!-- A short wide, secondary -->
<rect x="408" y="120" width="180" height="46" fill="#F5F5F5" stroke="#545454" stroke-width="1.6"/>
<text x="498" y="148" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="14" fill="#2a1a0e">A</text>
<text x="498" y="184" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">k</text>
<text x="598" y="146" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#545454">r</text>

<!-- annotate shared small r -->
<text x="430" y="230" text-anchor="start" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">shared rank r &lt;&lt; d, k</text>
<line x1="406" y1="135" x2="408" y2="135" stroke="#C8102E" stroke-width="1"/>

<text x="60" y="378" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The full-shape update factors into two thin matrices around a frozen base.</text>
<text x="60" y="396" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Trainable parameters fall from d x k to r (d + k), because the rank r is far smaller than either dimension.</text>
</svg>
