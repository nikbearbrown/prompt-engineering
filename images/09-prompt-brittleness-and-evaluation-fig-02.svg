<text x="520" y="130" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" text-anchor="middle">Output region 2</text>

<!-- Point 1 (region one) -->
<circle cx="350" cy="220" r="7" fill="#545454"/>
<!-- Point 2 (region two, across boundary) -->
<circle cx="470" cy="220" r="7" fill="#C8102E"/>

<!-- Crossing edit arrow (red emphasis) -->
<line x1="362" y1="220" x2="456" y2="220" stroke="#C8102E" stroke-width="2.5" marker-end="url(#arrow02)"/>
<text x="409" y="208" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E" text-anchor="middle">neutral edit</text>

<!-- Upstream stubs feeding each point: colon-like (two dots) vs dash-like (one bar) rendered abstractly -->
