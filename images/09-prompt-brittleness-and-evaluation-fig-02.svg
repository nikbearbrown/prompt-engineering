<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
<text x="40" y="42" font-family="'EB Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">Two prompts a human reads as identical are two points in token space</text>
<text x="40" y="64" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">A semantically-neutral edit can cross the decision boundary into a different output</text>

<!-- Conditioning space -->
<rect x="180" y="100" width="440" height="240" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
