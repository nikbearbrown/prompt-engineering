<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02 fig-desc-02">
<title id="fig-title-02">A neutral edit can move the conditioning point across a decision boundary</title>
<desc id="fig-desc-02">A conditioning space drawn as a rectangle bisected by one diagonal decision boundary into two output regions. Two near-boundary points sit on opposite sides, each fed by a tiny differing surface-form stub. A single-headed arrow shows a neutral edit nudging the point across the boundary, flipping the discrete output.</desc>
