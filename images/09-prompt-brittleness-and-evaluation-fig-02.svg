<line x1="110" y1="220" x2="338" y2="220" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrowk02)"/>
<circle cx="96" cy="214" r="2.5" fill="#2a1a0e"/>
<circle cx="96" cy="226" r="2.5" fill="#2a1a0e"/>
<text x="70" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">surface form A</text>

<!-- stub for point 2 -->
<line x1="110" y1="280" x2="464" y2="226" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrowk02)"/>
