<circle cx="120" cy="127" r="6" fill="#545454"/>
<circle cx="600" cy="127" r="6" fill="#545454"/>
<circle cx="360" cy="228" r="6" fill="#C8102E"/>

<text x="120" y="114" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">primacy</text>
<text x="600" y="114" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">recency</text>
