<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01 fig-desc-01"><title id="fig-title-01">The Escalation Ladder with Three Gates</title><desc id="fig-desc-01">A cost-ordered ladder descends through three gates. After defining an eval set and target metric, Gate 1 ships if prompting suffices. If not, Gate 2 escalates to SFT or RAG. If still insufficient, Gate 3 escalates to RL, the most expensive and irreversible rung. Each gate sits deeper and more indented to mark rising cost.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="13-beyond-prompting-the-fine-tuning-stack" figure-number="01" date-generated="2026-05-29"/></metadata>
