</defs>
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
<text x="350" y="34" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">The Escalation Ladder with Three Gates</text>
<text x="350" y="54" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Climb to the next rung only when the cheaper one is provably insufficient</text>

<!-- rising cost axis -->
<line x1="48" y1="80" x2="48" y2="380" stroke="#D4D4D4" stroke-width="1" marker-end="url(#ah1301)"/>
<text x="40" y="380" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 40 380)">rising cost</text>

<!-- Step 0 -->
<rect x="80" y="74" width="200" height="38" fill="#F5F5F5" stroke="#545454" stroke-width="1.5"/>
<text x="180" y="92" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Step 0: define eval set</text>
<text x="180" y="106" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">and target metric</text>
<line x1="180" y1="112" x2="180" y2="128" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ah1301)"/>

<!-- Gate 1 -->
<rect x="100" y="130" width="160" height="46" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.8"/>
<text x="180" y="150" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Gate 1: prompting</text>
<text x="180" y="166" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">metric met?</text>
<line x1="260" y1="153" x2="360" y2="153" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ah1301)"/>
<rect x="362" y="132" width="120" height="42" fill="#F5F5F5" stroke="#545454" stroke-width="1.5"/>
<text x="422" y="158" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Ship</text>
<line x1="180" y1="176" x2="180" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ah1301)"/>
<text x="200" y="192" text-anchor="start" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">if not</text>

<!-- Gate 2 (indented) -->
<rect x="150" y="202" width="160" height="46" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.8"/>
<text x="230" y="222" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Gate 2: SFT / RAG</text>
<text x="230" y="238" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">ceiling or volatility?</text>
<line x1="310" y1="218" x2="400" y2="206" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ah1301)"/>
<rect x="402" y="190" width="90" height="32" fill="#F5F5F5" stroke="#545454" stroke-width="1.5"/>
<text x="447" y="210" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">SFT</text>
<line x1="310" y1="234" x2="400" y2="246" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ah1301)"/>
<rect x="402" y="230" width="90" height="32" fill="#F5F5F5" stroke="#545454" stroke-width="1.5"/>
<text x="447" y="250" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">RAG</text>
<line x1="230" y1="248" x2="230" y2="272" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ah1301)"/>
<text x="250" y="264" text-anchor="start" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">if not</text>

<!-- Gate 3 (further indented) -->
<rect x="200" y="274" width="160" height="46" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.8"/>
<text x="280" y="294" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Gate 3: RL</text>
<text x="280" y="310" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">verifiable reward?</text>
<line x1="360" y1="297" x2="460" y2="297" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ah1301)"/>
<rect x="462" y="276" width="130" height="42" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.8"/>
<text x="527" y="296" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">RL training</text>
<text x="527" y="311" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">costliest, irreversible</text>

<text x="60" y="402" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The layers are ordered rungs, not rivals. Each gate's checkable condition must fail before control passes to the deeper, more expensive rung.</text>
</svg>
