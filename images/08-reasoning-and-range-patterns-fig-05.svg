<text x="490" y="354" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Use CoT-decoding instead</text>
<line x1="60" y1="386" x2="640" y2="386" stroke="#D4D4D4" stroke-width="1"/>

