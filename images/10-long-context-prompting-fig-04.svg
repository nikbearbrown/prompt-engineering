<text x="40" y="42" font-family="'EB Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">Where the harmful goal sits changes how often the attack succeeds</text>
<text x="40" y="64" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Attack-success rate by placement of the harmful goal in a long context</text>

