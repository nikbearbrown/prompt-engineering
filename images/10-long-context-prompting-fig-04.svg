<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04 fig-desc-04">
<title id="fig-title-04">Position is an attack surface: front-loaded goals raise attack success</title>
<desc id="fig-desc-04">A bar chart of attack-success rate from zero. A baseline bar sits at moderate height; a goal-at-front bar rises well above it as the worst case; a goal-at-end bar falls at or below baseline as the mitigated case. A reference line marks baseline height so front-above and end-below read at once.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="10-long-context-prompting" figure-number="04" date-generated="2026-05-29"/></metadata>
