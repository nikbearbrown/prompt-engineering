<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04 fig-desc-04"><title id="fig-title-04">The Lethal Trifecta</title><desc id="fig-desc-04">Three overlapping circles — access to private data, exposure to untrusted content, and the ability to communicate externally. Only the central region where all three overlap is filled, marking the exploitable zone.</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="14-prompt-engineering-for-cli-coding-agents" figure-number="04" date-generated="2026-05-29"/></metadata>
