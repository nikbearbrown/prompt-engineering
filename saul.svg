<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04 fig-desc-04"><title id="fig-title-04">The Decision Gate: Four Questions, Two Lanes</title><desc id="fig-desc-04">An incoming task enters a four-condition gate testing metric, eval set, high volume, and stability. If all four pass, it routes to the automated lane (signature, optimizer, compiled prompt). If any one fails, it routes to the manual lane (a write-and-tweak loop).</desc><metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book-slug="prompt-engineering" chapter="12-automated-prompt-optimization" figure-number="04" date-generated="2026-05-29"/></metadata>
